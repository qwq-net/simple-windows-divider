# windows-divider 設定ファイルの例。
#
# 実際の読み込み先は %APPDATA%\windows-divider\config.toml です（初回起動時に既定値で自動生成されます）。
# このファイルはあくまで書式の参考です。すべての項目は省略可能で、省略時は既定値が使われます。

[general]
enabled = true              # 機能の有効/無効（トレイからも切替可）。false の間は標準スナップを復元し介入しません
disable_snap = true         # 機能A: Windows 標準スナップ（Aero Snap）を無効化
disable_snap_assist = true  # 機能A: Snap Assist 系レジストリも無効化（best-effort）
auto_restore = true         # 機能C: 学習した配置を新規ウィンドウへ自動復元（トレイからも切替可）

# 機能B: グリッドの分割数。既定はウルトラワイド向けの 3列 × 2行（垂直3分割・水平2分割）。
# 各ウィンドウはグリッド上の占有セル範囲を持ち、矢印キーで 1 セルずつ動かします:
#   ← 幅2列以上なら右側を1列削る（左へ寄せて細く）/ 幅1列なら左へ1列広げる
#   → 幅2列以上なら左側を1列削る（右へ寄せて細く）/ 幅1列なら右へ1列広げる
#   ↑↓ 横の占有を保ったまま行方向に同様
# 例(3列): 全幅 →←→ ■■□ →←→ ■□□ →→→ ■■□ →→→ □■□
# 反対方向の同時押しで「押した方向の軸」を最大化（待ち時間なしで即判定）:
#   ←+→ → 横軸フル（行は維持）  例: □□□/■□□ → □□□/■■■
#   ↑+↓ → 縦軸フル（列は維持）
#   両方行えば全画面。
[grid]
columns = 3                 # 列数（横に並ぶセル数 / 垂直線で分割した数）。左右キーが動かす軸
rows = 2                    # 行数（縦に並ぶセル数 / 水平線で分割した数）。上下キーが動かす軸

# 機能B: ホットキーは矢印 4 方向のみ（学習コスト最小化）。四隅・最大化は矢印の組み合わせ／同時押しで到達。
# 修飾は Ctrl / Alt / Shift / Win(=Meta/Super/Cmd)、順不同・大小無視。
[hotkeys]
left  = "Ctrl+Alt+Left"
right = "Ctrl+Alt+Right"
up    = "Ctrl+Alt+Up"
down  = "Ctrl+Alt+Down"

# アンチチート安全のための「触らない」設定。
[exclusions]
# 介入しない実行ファイル名（basename・大小無視）。競技系のゲームを既定で同梱。
processes = [
    "csgo.exe",
    "cs2.exe",
    "valorant.exe",
    "valorant-win64-shipping.exe",
    "fortniteclient-win64-shipping.exe",
    "r5apex.exe",
]
skip_when_fullscreen = true    # フルスクリーン/排他状態のときは介入しない

# 機能C（自動復元）はルールを手書きしません。矢印キーでウィンドウを配置するたびに、その
# 実行ファイル名とウィンドウクラスに対する占有範囲を学習します（同じ組み合わせは最後の配置で上書き）。
# 同じアプリの新規ウィンドウが現れると、学習した占有範囲へ自動配置します。
# 学習データは別ファイル %APPDATA%\windows-divider\layouts.toml に保存され、通常は手で編集しません。
# 自動配置が不要なときは auto_restore = false（トレイの「覚えた配置を自動復元」でも切替可）。
