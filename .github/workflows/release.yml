name: Release

on:
  push:
    branches: [main]
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  check:
    name: Decide release
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.decide.outputs.should_release }}
      tag: ${{ steps.decide.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: decide
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            tag="$GITHUB_REF_NAME"
            ver="${tag#v}"
            cargo_ver="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')"
            if [ "$ver" != "$cargo_ver" ]; then
              echo "Tag $tag does not match Cargo.toml version $cargo_ver" >&2
              exit 1
            fi
          else
            ver="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')"
            tag="v$ver"
          fi
          if gh release view "$tag" >/dev/null 2>&1; then
            should_release=false
          else
            should_release=true
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "should_release=$should_release" >> "$GITHUB_OUTPUT"
          echo "Decided: tag=$tag should_release=$should_release"

  release:
    name: Build & Release (windows)
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test
      - name: Build (release)
        run: cargo build --release
      - name: Package
        shell: pwsh
        env:
          TAG: ${{ needs.check.outputs.tag }}
        run: |
          $name = "windows-divider-$($env:TAG)-x86_64-pc-windows-msvc"
          New-Item -ItemType Directory -Path dist | Out-Null
          Copy-Item target/release/windows-divider.exe dist/
          Copy-Item config.example.toml dist/
          Copy-Item README.md dist/
          Copy-Item LICENSE dist/
          Compress-Archive -Path dist/* -DestinationPath "$name.zip"
          $hash = (Get-FileHash "$name.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $name.zip" | Out-File -Encoding ascii "$name.zip.sha256"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check.outputs.tag }}
          files: |
            windows-divider-*-x86_64-pc-windows-msvc.zip
            windows-divider-*-x86_64-pc-windows-msvc.zip.sha256
          generate_release_notes: true
          prerelease: ${{ contains(needs.check.outputs.tag, '-') }}
